kind = "web"
previewPath = "/"
title = "ColorGifts"
version = "1.0.0"
id = "artifacts/colorgifts"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24425

[services.development]
run = "pnpm --filter @workspace/colorgifts run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/colorgifts", "run", "build" ]
publicDir = "artifacts/colorgifts/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24425"
BASE_PATH = "/"
